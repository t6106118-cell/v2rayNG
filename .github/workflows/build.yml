name: Build APK

on:
  workflow_dispatch:
    inputs:
      release_tag:
        required: false
        type: string
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_LIB_XRAY_COMMIT: ecf84ee82ac975c39852397351d1618a40df7cd2
      XRAY_CORE_VERSION: v1.260327.1-0.20260711155151-50231eaff98c
      XRAY_CORE_COMMIT: 50231eaff98ccc31b5cbd247a721c16e97fe5ec1
      XRAY_CORE_SUM: h1:SbB1ez0bqZllbzaVj0PC+Vje3dRA8m/7jW1ussjDSgM=

    steps:
    - name: Checkout code
      uses: actions/checkout@v7
      with:
        submodules: 'recursive'
        fetch-depth: '0'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v4
      with:
        log-accepted-android-sdk-licenses: false
        cmdline-tools-version: '14742923'
        packages: 'platforms;android-37.0 build-tools;37.0.0 platform-tools'

    - name: Install NDK
      run: |
        echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
          --channel=0 \
          --install "ndk;29.0.14206865"
        echo "NDK_HOME=$ANDROID_HOME/ndk/29.0.14206865" >> $GITHUB_ENV
        echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/29.0.14206865" >> $GITHUB_ENV
        sed -i '10i\
        \
            ndkVersion = "29.0.14206865"' ${{ github.workspace }}/V2rayNG/app/build.gradle.kts

    - name: Restore cached libhevtun
      id: cache-libhevtun-restore
      uses: actions/cache/restore@v6
      with:
        path: ${{ github.workspace }}/libs
        key: libhevtun-arm64-v8a-${{ runner.os }}-${{ env.NDK_HOME }}-${{ hashFiles('.git/modules/hev-socks5-tunnel/HEAD') }}-${{ hashFiles('compile-hevtun.sh') }}

    - name: Build libhevtun
      if: steps.cache-libhevtun-restore.outputs.cache-hit != 'true'
      run: |
        ABIS=arm64-v8a bash compile-hevtun.sh

    - name: Save libhevtun
      if: steps.cache-libhevtun-restore.outputs.cache-hit != 'true'
      uses: actions/cache/save@v6
      with:
        path: ${{ github.workspace }}/libs
        key: libhevtun-arm64-v8a-${{ runner.os }}-${{ env.NDK_HOME }}-${{ hashFiles('.git/modules/hev-socks5-tunnel/HEAD') }}-${{ hashFiles('compile-hevtun.sh') }}

    - name: Copy libhevtun
      run: |
        cp -r ${{ github.workspace }}/libs ${{ github.workspace }}/V2rayNG/app

    - name: Verify AndroidLibXrayLite revision
      run: |
        pushd AndroidLibXrayLite
        test "$(git rev-parse HEAD)" = "$ANDROID_LIB_XRAY_COMMIT"
        test "$(git describe --tags --exact-match HEAD)" = "v26.7.11"
        popd

    - name: Setup Golang
      uses: actions/setup-go@v6
      with:
        go-version-file: AndroidLibXrayLite/go.mod
        cache-dependency-path: AndroidLibXrayLite/go.sum

    - name: Build libv2ray
      run: |
        mkdir -p "$GITHUB_WORKSPACE/verification"
        pushd AndroidLibXrayLite
        go mod edit -dropreplace=github.com/xtls/xray-core
        mkdir -p assets data
        bash gen_assets.sh download
        cp -v data/*.dat assets/
        go mod tidy

        RESOLVED_XRAY=$(go list -m -f '{{if .Replace}}{{.Replace.Path}}@{{.Replace.Version}}{{else}}{{.Path}}@{{.Version}}{{end}}' github.com/xtls/xray-core)
        test "$RESOLVED_XRAY" = "github.com/xtls/xray-core@$XRAY_CORE_VERSION"

        go mod download -json github.com/xtls/xray-core > "$GITHUB_WORKSPACE/verification/xray-core-module.json"
        XRAY_INFO=$(jq -r '.Info' "$GITHUB_WORKSPACE/verification/xray-core-module.json")
        test "$(jq -r '.Sum' "$GITHUB_WORKSPACE/verification/xray-core-module.json")" = "$XRAY_CORE_SUM"
        test "$(jq -r '.Origin.URL' "$XRAY_INFO")" = "https://github.com/xtls/xray-core"
        test "$(jq -r '.Origin.Hash' "$XRAY_INFO")" = "$XRAY_CORE_COMMIT"
        cp "$XRAY_INFO" "$GITHUB_WORKSPACE/verification/xray-core.info"

        XRAY_DIR=$(go list -m -f '{{.Dir}}' github.com/xtls/xray-core)
        {
          grep -F 'Version_x byte = 26' "$XRAY_DIR/core/core.go"
          grep -F 'Version_y byte = 7' "$XRAY_DIR/core/core.go"
          grep -F 'Version_z byte = 11' "$XRAY_DIR/core/core.go"
        } | tee "$GITHUB_WORKSPACE/verification/xray-core-version-source.txt"
        go mod verify | tee "$GITHUB_WORKSPACE/verification/go-mod-verify.txt"

        MOBILE_VERSION=$(go list -m -f '{{.Version}}' golang.org/x/mobile)
        go install "golang.org/x/mobile/cmd/gomobile@$MOBILE_VERSION"
        export PATH=$PATH:~/go/bin
        gomobile init
        gomobile bind -v -target=android/arm64 -androidapi 24 -trimpath -ldflags='-s -w -buildid= -checklinkname=0' ./

        rm -rf "$RUNNER_TEMP/libv2ray-aar"
        unzip -q libv2ray.aar -d "$RUNNER_TEMP/libv2ray-aar"
        test "$(find "$RUNNER_TEMP/libv2ray-aar/jni" -mindepth 1 -maxdepth 1 -type d -printf '%f\n')" = "arm64-v8a"
        go version -m "$RUNNER_TEMP/libv2ray-aar/jni/arm64-v8a/libgojni.so" | tee "$GITHUB_WORKSPACE/verification/aar-go-build-info.txt"
        grep -F $'\tdep\tgithub.com/xtls/xray-core\t'"$XRAY_CORE_VERSION"$'\t'"$XRAY_CORE_SUM" "$GITHUB_WORKSPACE/verification/aar-go-build-info.txt"
        if grep -F 'github.com/autorepobot/xray-core' "$GITHUB_WORKSPACE/verification/aar-go-build-info.txt"; then
          echo "Unexpected replacement Xray module in libv2ray.aar" >&2
          exit 1
        fi
        sha256sum "$RUNNER_TEMP/libv2ray-aar/jni/arm64-v8a/libgojni.so" | tee "$GITHUB_WORKSPACE/verification/aar-libgojni.sha256"
        popd
        mkdir -p V2rayNG/app/libs
        cp AndroidLibXrayLite/libv2ray.aar V2rayNG/app/libs/

    - name: Setup Java
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Decode Keystore
      uses: timheuer/base64-to-file@v2.0.0
      id: android_keystore
      with:
        fileName: "android_keystore.jks"
        encodedString: ${{ secrets.APP_KEYSTORE_BASE64 }}

    - name: Build APK
      run: |
        cd ${{ github.workspace }}/V2rayNG
        echo "sdk.dir=${ANDROID_HOME}" > local.properties
        chmod 755 gradlew
        ./gradlew licenseFdroidReleaseReport
        ./gradlew assembleFdroidRelease -PABI_FILTERS=arm64-v8a -Pandroid.injected.signing.store.file=${{ steps.android_keystore.outputs.filePath }} -Pandroid.injected.signing.store.password=${{ secrets.APP_KEYSTORE_PASSWORD }} -Pandroid.injected.signing.key.alias=${{ secrets.APP_KEYSTORE_ALIAS }} -Pandroid.injected.signing.key.password=${{ secrets.APP_KEY_PASSWORD }}

    - name: Verify ARM64 APK
      run: |
        mapfile -t APKS < <(find V2rayNG/app/build/outputs/apk/fdroid/release -type f -name '*arm64-v8a*.apk')
        test "${#APKS[@]}" -eq 1
        APK="${APKS[0]}"

        test "$(unzip -Z1 "$APK" | awk -F/ '/^lib\/[[:alnum:]_-]+\/.*\.so$/{print $2}' | sort -u)" = "arm64-v8a"
        unzip -p "$APK" lib/arm64-v8a/libgojni.so > "$RUNNER_TEMP/apk-libgojni.so"
        cp "$RUNNER_TEMP/libv2ray-aar/jni/arm64-v8a/libgojni.so" "$RUNNER_TEMP/aar-libgojni-stripped.so"
        "$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip" --strip-unneeded "$RUNNER_TEMP/aar-libgojni-stripped.so"
        cmp "$RUNNER_TEMP/aar-libgojni-stripped.so" "$RUNNER_TEMP/apk-libgojni.so"

        go version -m "$RUNNER_TEMP/apk-libgojni.so" | tee "$GITHUB_WORKSPACE/verification/apk-go-build-info.txt"
        grep -F $'\tdep\tgithub.com/xtls/xray-core\t'"$XRAY_CORE_VERSION"$'\t'"$XRAY_CORE_SUM" "$GITHUB_WORKSPACE/verification/apk-go-build-info.txt"
        if grep -F 'github.com/autorepobot/xray-core' "$GITHUB_WORKSPACE/verification/apk-go-build-info.txt"; then
          echo "Unexpected replacement Xray module in APK" >&2
          exit 1
        fi

        {
          echo "AndroidLibXrayLite commit: $ANDROID_LIB_XRAY_COMMIT"
          echo "Xray-core module: github.com/xtls/xray-core@$XRAY_CORE_VERSION"
          echo "Xray-core upstream commit: $XRAY_CORE_COMMIT"
          echo "Xray-core module sum: $XRAY_CORE_SUM"
          echo "APK: $(basename "$APK")"
          sha256sum "$APK"
          sha256sum "$RUNNER_TEMP/apk-libgojni.so"
        } | tee "$GITHUB_WORKSPACE/verification/xray-core-build-evidence.txt"

        cat "$GITHUB_WORKSPACE/verification/xray-core-build-evidence.txt" >> "$GITHUB_STEP_SUMMARY"

    - name: Upload ARM64 APK and verification evidence
      uses: actions/upload-artifact@v7
      if: ${{  success() }}
      with:
        name: v2rayNG-arm64-v8a-xray-v26.7.11
        if-no-files-found: error
        path: |
          ${{ github.workspace }}/V2rayNG/app/build/outputs/apk/fdroid/release/*arm64-v8a*.apk
          ${{ github.workspace }}/verification/

  sign-and-release:
    needs: build
    runs-on: ubuntu-26.04
    if: github.event_name == 'workflow_dispatch' && inputs.release_tag != ''

    steps:
      - name: Download APK artifacts
        uses: actions/download-artifact@v8
        with:
          path: release

      - name: Sign APK files
        run: |
          printf '%s' "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          KEY=$(gpg --list-secret-keys --with-colons | awk -F: '/^fpr:/ {print $10; exit}')
          mkdir -p release-files

          find release -type f -name '*.apk' | while read apk; do
            cp "$apk" release-files/
            gpg --batch --yes --local-user "$KEY" --detach-sign --output "release-files/$(basename "$apk").sig" "$apk"
          done

          gpg --armor --export "$KEY" > release-files/v2rayN-public-key.asc

      - name: Upload APKs, signatures and public key to release
        uses: svenstaro/upload-release-action@v2
        with:
          file: release-files/*
          tag: ${{ inputs.release_tag }}
          file_glob: true
          prerelease: true
